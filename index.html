<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookieKit Demo</title>
  <!-- Add script from cookiekit -->
  <script type="module" src="https://cdn.cookiekit.eu/cookiekit/cookiekit.esm.js"></script>
  <script nomodule src="https://cdn.cookiekit.eu/cookiekit/cookiekit.js"></script>

</head>

<body>
  <consent-guard consent="analytics">
    <script type="text/plain">
        window.cookieKitGuardDemo = {
          source: 'consent-guard-inline-script',
          activatedAt: new Date().toISOString(),
          message: 'Analytics consent granted. Guarded script executed.',
        };
      </script>
  </consent-guard>

  <consent-dialog design="standard" expires-days="180"></consent-dialog>
  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
